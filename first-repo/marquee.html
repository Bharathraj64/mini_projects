<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <marquee behavior="alternate" direction="left">
      This text is scrolling from right to left
    </marquee>
    <marquee behavior="alternate" direction="left" scrollamount="50">
      This text is scrolling from right to left
    </marquee>
    <marquee behavior="alternate" loop="5" direction="left" scrollamount="50">
      This text is scrolling from right to left
    </marquee>
    <marquee
      behavior="alternate"
      direction="left"
      bgcolor="yellow"
      scrollamount="25"
    >
      This text is scrolling from right to left
    </marquee>
    <marquee behavior="alternate" direction="top" scrollamount="10">
      <img
        src="https://tse1.mm.bing.net/th/id/OIP.HMpeXdgaON8j3B4i6uUKRwHaEK?cb=defcache2&defcache=1&rs=1&pid=ImgDetMain&o=7&rm=3"
        alt=""
      />
    </marquee>
  </body>
</html>
